name: CI/CD Tests

on:
  push:
    branches:
      - main
      - release
    tags:
      - "v*.*.*"          # ← add this
  pull_request:
    branches:
      - main
      - release

permissions:
  contents: read

jobs:
  test:
    name: Test on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies and package in editable mode
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Run test suite (pytest & smoke tests)
      run: |
        pytest

  publish:
    name: Publish to PyPI
    needs: test                        # only runs if all tests pass
    if: startsWith(github.ref, 'refs/tags/v')   # only runs on tag push
    runs-on: ubuntu-latest
    environment: pypi                  # matches environment name on PyPI
    permissions:
      contents: read
      id-token: write                  # required for trusted publishing

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install build tools
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1